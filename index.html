<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel PlayFit</title>
    <!-- Biblioteca de Conexão -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; }
        input { width: 100%; padding: 10px; box-sizing: border-box; background: #333; color: white; border: 1px solid #555; }
        button { padding: 12px; cursor: pointer; font-weight: bold; border: none; border-radius: 5px; background: #f2e307; color: black; margin: 5px 0; }
        .btn-red { background: #ff4444; color: white; }
        .btn-king { background: #f2e307; }
        #status { font-weight: bold; padding: 10px; border-radius: 5px; background: #333; margin-bottom: 15px; display: inline-block; }
    </style>
</head>
<body>

    <div id="status" style="color: orange;">🔴 AGUARDANDO CONEXÃO...</div>

    <!-- REI -->
    <div class="card" style="border-color: #f2e307;">
        <h3>👑 REI DA QUADRA</h3>
        <input type="text" id="kingName" value="DUPLA REI" oninput="updateData()">
        <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 10px;">
            <button onclick="changeScore('king', -1)" style="width: 30%;">-1</button>
            <span id="kingScore" style="font-size: 32px;">0</span>
            <button onclick="changeScore('king', 1)" style="width: 30%;">+1</button>
        </div>
    </div>

    <!-- CRONOMETRO -->
    <div class="card">
        <h3>⏱ CRONÔMETRO: <span id="timerDisp">15:00</span></h3>
        <button onclick="timerAct('start')">INICIAR</button>
        <button onclick="timerAct('pause')" style="background: #ff9800;">PAUSAR</button>
        <button onclick="timerAct('reset')" class="btn-red">RESET</button>
    </div>

    <!-- DESAFIANTES -->
    <div id="challengersList"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        let peer, conn;

        let state = {
            king: { name: "DUPLA REI", score: 0 },
            teams: [
                { name: "Dupla 2", score: 0 },
                { name: "Dupla 3", score: 0 },
                { name: "Dupla 4", score: 0 }
            ],
            timer: 900,
            timerRunning: false
        };

        // Inicia o PeerJS
        function init() {
            if (!roomId) {
                document.body.innerHTML = "<h1>ERRO: Use ?room=1234 no link</h1>";
                return;
            }

            peer = new Peer();

            peer.on('open', () => {
                conn = peer.connect(roomId);
                conn.on('open', () => {
                    document.getElementById('status').innerText = "✅ CONECTADO AO OVERLAY";
                    document.getElementById('status').style.color = "lime";
                    send();
                });
            });

            renderTeams();
            
            // Loop do tempo
            setInterval(() => {
                if (state.timerRunning && state.timer > 0) {
                    state.timer--;
                    updateUI();
                    send();
                }
            }, 1000);
        }
