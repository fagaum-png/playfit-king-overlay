<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PlayFit Overlay</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --yellow: #f2e307; --dark: rgba(0,0,0,0.85); }
        body { margin: 0; padding: 0; font-family: 'Arial Black', sans-serif; color: white; overflow: hidden; background: transparent; }
        #overlay { width: 1920px; height: 1080px; position: relative; }

        /* Topo: Logo e Evento */
        .header { position: absolute; top: 40px; left: 40px; display: flex; align-items: center; }
        .logo { background: var(--yellow); color: black; padding: 10px 20px; font-size: 30px; font-weight: 900; skew: -10deg; }
        .event-info { margin-left: 20px; text-transform: uppercase; border-left: 4px solid var(--yellow); padding-left: 15px; }

        /* Cronômetro Central */
        .timer-box { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: var(--dark); border-bottom: 4px solid var(--yellow); padding: 10px 40px; font-size: 50px; min-width: 150px; text-align: center; }

        /* Placar do Rei (Centro Inferior) */
        .king-board { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; background: var(--dark); border: 2px solid var(--yellow); min-width: 600px; animation: fadeInUp 0.5s ease; }
        .king-label { background: var(--yellow); color: black; padding: 15px; font-size: 20px; font-weight: bold; }
        .king-name { flex-grow: 1; text-align: center; font-size: 35px; padding: 0 20px; }
        .king-score { background: #222; color: var(--yellow); padding: 15px 30px; font-size: 45px; border-left: 2px solid var(--yellow); }

        /* Ranking Lateral */
        .ranking { position: absolute; top: 150px; right: 40px; width: 320px; }
        .rank-item { display: flex; justify-content: space-between; background: rgba(0,0,0,0.7); margin-bottom: 5px; padding: 12px 20px; border-left: 4px solid #555; transition: 0.5s; }
        .rank-item.top1 { border-left-color: var(--yellow); background: rgba(242, 227, 7, 0.2); transform: scale(1.05); }

        /* Patrocinador */
        .sponsor { position: absolute; bottom: 40px; right: 40px; background: white; color: black; padding: 5px 20px; font-weight: bold; }

        @keyframes fadeInUp { from { opacity: 0; transform: translate(-50%, 50px); } to { opacity: 1; transform: translate(-50%, 0); } }
    </style>
</head>
<body>
    <div id="overlay">
        <div class="header">
            <div class="logo">PLAYFIT</div>
            <div class="event-info"><div id="ev-name">KING OF THE COURT</div></div>
        </div>
        <div class="timer-box" id="disp-timer">15:00</div>
        <div class="ranking" id="disp-rank"></div>
        <div class="king-board">
            <div class="king-label">KING</div>
            <div class="king-name" id="disp-king-name">AGUARDANDO...</div>
            <div class="king-score" id="disp-king-score">0</div>
        </div>
        <div class="sponsor" id="disp-sponsor">PLAYFIT VÔLEI</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        if(!roomId) document.body.innerHTML = "ADICIONE ?room=NOME NA URL";

        const peer = new Peer(roomId);
        peer.on('connection', conn => {
            conn.on('data', data => {
                document.getElementById('ev-name').innerText = data.event;
                document.getElementById('disp-sponsor').innerText = data.sponsor;
                document.getElementById('disp-king-name').innerText = data.king.name;
                document.getElementById('disp-king-score').innerText = data.king.score;
                
                const m = Math.floor(data.timer / 60);
                const s = data.timer % 60;
                document.getElementById('disp-timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;

                // Ranking
                const all = [data.king, ...data.teams].sort((a,b) => b.score - a.score);
                const rDiv = document.getElementById('disp-rank');
                rDiv.innerHTML = "";
                all.slice(0,5).forEach((t, i) => {
                    rDiv.innerHTML += `<div class="rank-item ${i==0?'top1':''}"><span>${i+1}. ${t.name}</span><b>${t.score}</b></div>`;
                });
            });
        });
    </script>
</body>
</html>
