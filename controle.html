<script src="script.js"></script>
    <script>
        // Inicia a conexão
        initControl();

        // Desenha os botões dos desafiantes
        function renderControlRanking() {
            const container = document.getElementById('ranking-controls');
            container.innerHTML = '<h4>Desafiantes</h4>';
            state.challengers.forEach((team, index) => {
                const div = document.createElement('div');
                div.style.marginBottom = "10px";
                div.innerHTML = `
                    <input type="text" value="${team.name}" oninput="state.challengers[${index}].name = this.value; pushUpdate()" style="width:50%">
                    <button onclick="changeScore(${index}, 1)">+1</button>
                    <button onclick="promoteToKing(${index})">👑</button>
                `;
                container.appendChild(div);
            });
        }
        // Chama uma vez para desenhar a lista
        setTimeout(renderControlRanking, 500);
    </script>
