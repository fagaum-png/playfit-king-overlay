<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle PlayFit</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body style="background:#111; color:white; padding:20px; font-family:sans-serif; overflow-y:auto;">
    
    <div id="status" style="color:orange; font-weight:bold; margin-bottom:10px;">Tentando Conectar...</div>

    <div style="background:#222; padding:15px; border-radius:10px; margin-bottom:20px; border: 2px solid gold;">
        <h3>👑 REI ATUAL</h3>
        <input type="text" id="king-name-input" oninput="state.king.name = this.value; sync()" style="width:100%; padding:10px; font-size:18px;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-top:10px;">
            <button onclick="changeScore('king', -1)" style="width:60px;">-1</button>
            <span id="king-score-label" style="font-size:30px;">0</span>
            <button onclick="changeScore('king', 1)" style="width:60px;">+1</button>
        </div>
    </div>

    <div style="background:#222; padding:15px; border-radius:10px; margin-bottom:20px;">
        <h3>⏱ CRONÔMETRO: <span id="display-timer">15:00</span></h3>
        <button onclick="timerAction('start')">INICIAR</button>
        <button onclick="timerAction('pause')" style="background:orange;">PAUSAR</button>
        <button onclick="timerAction('reset')" style="background:red;">RESET</button>
    </div>

    <div id="ranking-controls">
        <!-- JS vai desenhar aqui -->
    </div>

    <script src="script.js"></script>
    <script>
        // Forçar a inicialização
        window.onload = initControl;
    </script>
</body>
</html>
